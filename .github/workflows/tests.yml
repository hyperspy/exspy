name: Tests

on:
  push:
    branches-ignore:
      - 'dependabot/**'
      - 'pre-commit-ci-update-config'
  pull_request:

jobs:
  download_cache_GOS:
    # Use the "reusable workflow" from the hyperspy organisation
    uses: hyperspy/.github/.github/workflows/download_exspy_GOS.yml@main

  run_test_site:
    name: ${{ matrix.os }}-py${{ matrix.PYTHON_VERSION }}${{ matrix.LABEL }}
    needs: [download_cache_GOS]
    runs-on: ${{ matrix.os }}-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -el {0}
    env:
      MPLBACKEND: agg
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, windows, macos]
        PYTHON_VERSION: ['3.11', '3.13']
        LABEL: ['']
        PIP_SELECTOR: ['[tests, speed]']
        include:
          - os: ubuntu
            PYTHON_VERSION: '3.10'
            PIP_SELECTOR: '[tests, speed]'
          - os: ubuntu
            PYTHON_VERSION: '3.12'
            PIP_SELECTOR: '[tests, speed]'
          - os: ubuntu
            PYTHON_VERSION: '3.14'
            PIP_SELECTOR: '[tests, speed]'
          # test with hyperspy dev branch
          - os: ubuntu
            PYTHON_VERSION: '3.13'
            PIP_SELECTOR: '[tests, speed]'
            LABEL: '-dev'
          # test minimum requirement
          - os: ubuntu
            PYTHON_VERSION: '3.10'
            LABEL: '-minimum'
            PIP_SELECTOR: '[tests]'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: get repository name
        run: echo "REPOSITORY_NAME=${GITHUB_REPOSITORY#*/}" >> $GITHUB_ENV

      - name: Fetch tags upstream
        if: ${{ github.repository_owner != 'hyperspy' }}
        # Needs to fetch the tags from upstream to get the
        # correct version with setuptools_scm
        run: |
          git remote add upstream https://github.com/hyperspy/${{ env.REPOSITORY_NAME }}.git
          git fetch upstream --tags

      - uses: ssciwr/pooch-cache@v1
        with:
          name: pooch
          fail-on-cache-miss: true

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          python-version: ${{ matrix.PYTHON_VERSION }}

      - name: Display version
        run: |
          python --version
          pip --version

      - name: Install
        run: |
          pip install -e '.${{ matrix.PIP_SELECTOR }}'

      - name: Install (HyperSpy dev)
        # Test against the hyperspy `RELEASE_next_minor` branch
        if: contains( matrix.LABEL, 'dev')
        run: |
          pip install https://github.com/hyperspy/hyperspy/archive/RELEASE_next_minor.zip

      - name: Pip list
        run: |
          pip list

      - name: Run test suite
        run: |
          pytest --pyargs exspy -n 2 --cov=. --cov-report=xml

      - name: Upload coverage to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
